<div class="hero min-h-screen bg-base-300">
  <div class="hero-content text-center">
    <div class="max-w-md card bg-base-100 shadow-2xl">
      <div class="card-body gap-4">
        <p class="text-base-content">Enter the secret passcode</p>

        <div class="form-control">
          <input
            type="password"
            placeholder="Passcode"
            (keyup.enter)="checkPasscode()"
            [(ngModel)]="userInput"
            class="input input-bordered input-primary w-full max-w-xs text-center"
          />
        </div>

        <div class="card-actions justify-center">
          <button class="btn btn-primary w-full" (click)="checkPasscode()">
            Enter Catan
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
